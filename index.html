<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#111111" />
  <title>GymBaddies</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div id="screen-users">
    <div class="logo">GymBaddies 💪</div>
    <h2>Trainingsplan</h2>
    <p>Wer trainiert heute?<br />Wähle ein Profil oder leg ein neues an.</p>
    <div class="user-list" id="user-list"></div>
    <div class="add-user-row">
      <input id="new-user-inp" type="text" placeholder="Neuer Name" autocomplete="off" />
      <button id="add-user-btn" type="button" aria-label="Benutzer anlegen">+</button>
    </div>
    <div class="start-hint">Button wird rot, sobald ein Name eingetragen ist.</div>
  </div>

  <div id="screen-app">
    <header id="header">
      <div class="h-top">
        <div class="h-title">GymBaddies 💪</div>
        <div class="h-actions">
          <button id="top-plans" type="button" class="top-chip"><span>🛠️</span><span>Pläne</span></button>
          <button class="h-user top-profile" id="top-profile-menu" type="button" aria-label="Profil und Einstellungen">
            <span class="h-avatar" id="h-avatar"></span>
            <span class="h-name" id="h-name"></span>
            <span class="menu-dot">⌄</span>
          </button>
        </div>
      </div>
      <div class="seg">
        <button class="seg-btn active" id="tab-home" type="button">🏠 Home</button>
        <button class="seg-btn" id="tab-train" type="button">🏋️ Training</button>
        </div>
      <div class="split-tabs" id="split-tabs"></div>
      <div class="daytabs" id="daytabs"></div>
    </header>

    <main class="pcontent screen active" id="home-content"></main>
    <main class="tcontent screen" id="train-content"></main>
    <main class="pcontent screen" id="prog-content"></main>
    <main class="pcontent screen" id="plan-content"></main>
    <main class="pcontent screen" id="settings-content"></main>

    <div id="finish-bar"><div id="finish-bar-inner"></div></div>
    <div id="rest-float" class="rest-float">
      <div>
        <div class="rest-label">Pause läuft</div>
        <div class="rest-time" id="rest-time">01:30</div>
      </div>
      <button class="rest-close" type="button" id="rest-close">×</button>
    </div>
    <div id="app-toast" class="toast"></div>
    <div id="account-menu" class="account-menu" aria-hidden="true">
      <button type="button" id="menu-settings">⚙️ Einstellungen</button>
      <button type="button" id="menu-profile-switch">👥 Profil wechseln</button>
      <button type="button" id="menu-close">Schließen</button>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/data.js"></script>
<script src="js/app.js"></script>
  <script>if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));}</script>
</body>
</html>
